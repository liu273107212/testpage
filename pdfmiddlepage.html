<body class="root">
    <div class="page-container" id="app" v-cloak>
        <div class="header animate__animated animate__fadeIn" >
            <div class="t-c  po-r">
                <img src="./img/icon-back.png" alt="" class="back-iocn" @click="finish">
                <span class="f-s-16 f-w-b">25年国考申论预测卷</span>

        <div class="po-r" style="margin-top: 15vh;">
            <div style="width: 1.2rem;margin: 0 auto;">
                <div class="t-c po-r cover" style="width: 1.3rem;height: 1.5rem; border-radius: .1rem;background-color: #f8f7f7;overflow: hidden;">

            <div style="width: 2.5rem;margin: .5rem auto 0;">
                <van-button color="rgb(255, 51, 51)" block round style="height: .4rem;font-weight: bold;" @click="previwPdf">点击领取</van-button>
            </div>
            <p class="f-s-12 " style="width: 100vw;margin-top: 20px;text-align: center;">无法领取，可添加仓仓学姐微信领取：buzhiawu666</p>
        </div>
    </div>
    <script src="https://img.yaotia.com/js/jquery.min.js"></script>
    <script src="https://img.yaotia.com/L_JS/vue.min.js"></script>
    <script src="https://img.yaotia.com/L_JS/L_vant_v_2_11/vatn.min.js"></script>
    <!-- <script src="https://img.yaotia.com/L_JS/vconsole.min.js"></script> -->

    <script>
        // var vConsole = new VConsole();
        var isiOS = !!navigator.userAgent.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/); //ios终端
        var app = new Vue({
            el: '#app',
            data() {
                return {
                    isTop: false,
                    isHidden: false,
                    hidden: false,
                    timer: null,
                    pageLoad: false,
                    pdf: 'https://img.yaotia.com/ac/2024/10-18/jzkfile/nTYQJDfQijHfyYXG_0.pdf',
                    name: '25年国考申论预测卷'
                }
            },

            created() {
                
            },
            mounted() {
                document.addEventListener('visibilitychange', this.visibilitychangeFn)
                window.addEventListener('scroll', this.handleScroll)
            },
            methods: {
                finish() {
                    window.buzhi && window.buzhi.finish()
                    window.finish && window.finish(1)
                },
                previwPdf() {
                    clearTimeout(this.timer)
                    this.timer = setTimeout(() => {
                        clearTimeout(this.timer)
                        if(!this.hidden) {
                            this.$dialog.alert({
                                title: '提示',
                                message: '若您点击无法查看资料\n请将APP升级到最新版本再试试~',
                            })
                        }
                    }, 1250)
                    let url = `sadepot://sac.com/module/pdf/preview?pdfName=${this.name}&fileURL=${this.pdf}&isHideBottomBar=1`
                    window.location.href = url
                },
                visibilitychangeFn() {
                    this.isHidden = document.hidden;
                    if (this.isHidden) {
                        console.log('隐藏了');
                        this.hidden = true
                    } else {
                        console.log('显示了了');
                        // this.hidden = false
                    }
                },
                handleScroll(){
                    var scrollTop = document.body.scrollTop || document.documentElement.scrollTop
                    scrollTop > 200 ? this.isTop = true : this.isTop = false
                },
            }
        })
        function getQueryVariable(variable) {
            var query = window.location.search.substring(1);
            var vars = query.split("&");
            for (var i=0;i<vars.length;i++) {
                var pair = vars[i].split("=");
                if(pair[0] == variable){return pair[1];}
            }
            return(false);
        }
    </script>
