<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <meta name="description" content="图形推理秒杀课程" />
  <title>图形推理秒杀课程</title>

  <meta name="referrer" content="no-referrer" />

  <link rel="stylesheet" href="https://img.yaotia.com/L_CSS/21_09_15_01/common.min.css">
  <link rel="stylesheet" href="https://img.yaotia.com/css/L_0113/animate.min.css">
  <style>
    body {
        background: #252425;
    }
    .container {
        max-width: 540px;
        margin: 0 auto;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .van-loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .box {
        height: 100vh;
        width: 100vw;
        box-sizing: border-box;
        padding: .32rem;
        /* background: url('./img/bg.png') no-repeat;
        background-size: 100% 100%; */
    }
    #playbutton {
        width: 64px!important;
        height: 64px!important;
        margin-left: -32px!important;
        content: url('https://img.yaotia.com/sac/test/img/btn.png');
    }
    #plv_container {
        background-color: #252425!important;
        border-radius: 15px;
        video {
            border-radius: 15px;
        }
    }
    .fix-btn {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        bottom: .4rem;
        z-index: 1999;
    }
    .imgimg {
        width: 3.12rem;
        margin: 0 auto;
    }
    .fix-img {
        position: absolute;
        top: 0;
        left: 0;
    }
    .fix-img-img {
        width: '3.11rem';
        height: '5.8rem';
    }
    .fix-img-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 64px;
        height: 64px;
    }
    .pop-arrow {
        display: block;
        margin: 0 auto;
        padding: .15rem;
        width: .24rem;

    }
    @keyframes aniscale {
        0% {
            transform: scale(.99);
        }
        100% {
            transform: scale(1.02);
        }
    }
    .ani-scal {animation: aniscale .4s infinite alternate;}
  </style>
  <script>
    var _hmt = _hmt || [];
    (function() {
      var hm = document.createElement("script");
      hm.src = "https://hm.baidu.com/hm.js?df8113477d3faa84e5145459fa8b1296";

<body class="root">
    <div id="app" class="container" v-cloak>
        <div class="po-r box">
            <div class="viedo-box po-r" style="border-radius: 15px;overflow: hidden; width: 3.11rem;height: 5.8rem;">
                <div id="player" style="width: 3.11rem;height: 5.8rem;"></div>
                <div class="fix-img">
                    <img src="https://img.yaotia.com/sac/test/img/banner.png" alt="" class="fix-img-img animate__animated animate__fadeIn" @click="resumeVideo" v-if="finish">
                </div>
                <img src="https://img.yaotia.com/sac/test/img/btn.png" alt="" class="fix-img-btn" @click="resumeVideo" v-if="finish">
                <div id="line"></div>
            </div>
            <!-- v-if="showBtn" -->
            <div class="fix-btn " v-if="showBtn">
                <div class="ani-scal">
                    <img src="https://img.yaotia.com/sac/test/img/fix-btn.png" alt="" class="imgimg animate__animated animate__fadeInUp " @click="show=true"> 
                </div>
            </div>
        </div>
        <van-popup v-model="show" position="bottom" safe-area-inset-bottom round>
            <img class="pop-arrow" src="https://img.yaotia.com/act/m-icon/pop-close-arrow.png" alt="" @click="show=false" />
            <div style="padding: .1rem .19rem .19rem;">
                <img src="https://img.yaotia.com/sac/test/img/20240618/pop.png" alt="" class="animate__animated animate__fadeIn">
            </div>
            <img src="https://img.yaotia.com/sac/test/img/20240620/pop-btn-app.png" alt="" style="width: 3.12rem;" class="mt-15 mb-50 m-auto ani-scal"
                @click="addMini" v-if="isApp && !isgkld"
            >
            <img src="https://img.yaotia.com/sac/test/img/20240618/pop-btn.png" alt="" style="width: 3.12rem;" class="mt-15 mb-50 m-auto ani-scal" @click="gowx" v-else>
        </van-popup>
    </div>
    <script src="https://img.yaotia.com/js/jquery.min.js"></script>
    <script src="https://img.yaotia.com/L_JS/vue.min.js"></script>
    <script src="https://img.yaotia.com/L_JS/L_vant_v_2_11/vatn.min.js"></script>
    <script>

        var app = new Vue({
            el: '#app',
            data: function () {
                return {
                    player: null,
                    vodPlayerJs: 'https://player.polyv.net/script/player.js',
                    // vid:'1e6eaa05afcf46dc01d5ba880f51bb13_1',
                    // vid:'88083abbf5bcf1356e05d39666be527a_8',
                    vid:'1e6eaa05afe8f53c52cdd1eab3637a1d_1',
                    finish: false,
                    showBtn: false,
                    bottom: 0,
                    show: false,
                    isPhone: true
                }
            },
            computed: {
                isApp: function(){
                    return !!(window.buzhi || window.get_uuid || window.iOSUserInfo)
                    // return true
                },
                isWx() {
                    return navigator.userAgent.toLowerCase().indexOf('micromessenger') !== -1
                },
                isgkld() {
                    return navigator.userAgent.indexOf("Gkld") != -1
                    // return true
                }
            },
            mounted: function () {
                
                var isPhone = /phone|pad|pod|iPhone|iPod|ios|iPad|Android|Mobile|BlackBerry|IEMobile|MQQBrowser|JUC|Fennec|wOSBrowser|BrowserNG|WebOS|Symbian|Windows Phone/i.test(navigator.userAgent)
                if (isPhone) {
                    this.isPhone = true
                }else{
                    this.isPhone = false
                }
                this.loadPlayerScript(this.loadPlayer)

            },
            methods: {
                gowx() {
                    this.copy('buzhiawu666', () => {
                        this.$toast({ position: 'bottom', message: '微信号复制成功，前往微信添加' })
                        const wxUrl = "gkld://gongkaoleida/browser?param1=weixin://";
                        window.location.href = wxUrl
                    })
                },
                // 计算dom距离视窗底部的距离
                calculateDistanceToBottom(targetDom) {
                    const windowHeight = window.innerHeight; // 视窗高度
                    const rect = targetDom.getBoundingClientRect(); // 获取目标 <div> 的位置信息
                    // 计算距离视窗底部的实时距离
                    const distanceToBottom = windowHeight - rect.bottom;
                    return distanceToBottom;
                },
                resumeVideo() {
                    this.player.j2s_resumeVideo()
                    this.finish = false
                },
                loadPlayerScript(callback) {
                    if (!window.polyvPlayer) {
                        const myScript = document.createElement('script')
                        myScript.setAttribute('src', this.vodPlayerJs)
                        myScript.onload = callback
                        document.body.appendChild(myScript)
                    } else {
                        callback()
                    }
                },
                loadPlayer() {
                    $.ajax({
                        url: 'https://api.yaotia.cn/web/polyv/getToken?vid=' + this.vid,
                        dataType: 'json',
                        success: (res) => {
                            const polyvPlayer = window.polyvPlayer;
                            this.player = polyvPlayer({
                                wrap: '#player',
                                width: '3.11rem',
                                height: '5.8rem',
                                vid: this.vid,
                                code: 'sac',
                                video_align: 'top',
                                ban_ui: true,
                                loading_bg_img: 'https://img.yaotia.com/sac/test/img/banner.png',
                                playsafe: res.data && res.data.playsafe,
                            });
                            window.s2j_onPlayOver=() => {//播放结束，到最后一秒
                                this.finish = true
                            }
                            window.s2j_onPlayerInitOver=() => {//播放结束，到最后一秒
                                this.showBtn = true
                                this.bottom = this.calculateDistanceToBottom(document.getElementById('line'))
                                console.log(this.bottom);
                            }
                        },
                        error: function (res) {
                            alert(JSON.stringify(res))
                        }
                    })
                    
                },
                copy: function (copyText, callback) {
                    var copyText = copyText || '复制了？'
                    let copyDom = document.createElement('span');
                    copyDom.style.position = 'absolute'
                    copyDom.style.left = '-9999px'
                    copyDom.style.opacity = '0'
                    copyDom.innerText = copyText
                    document.body.appendChild(copyDom)
                    const range = document.createRange();
                    range.selectNode(copyDom);
                    const selection = window.getSelection();
                    if(selection.rangeCount > 0) selection.removeAllRanges();
                    selection.addRange(range);
                    document.execCommand('Copy');
                    console.log(copyText, '--复制成功')
                    document.body.removeChild(copyDom)
                    if(callback) {
                        callback()
                    }
                },
                addMini() {
                    var luachUrl = `pages/wxWebView/wxWebView?page_id=13_1_20`
                    this.awakenMini(luachUrl)
                },
                openTinyAppFn(idFn, path) {
                    window.open_tinyApp && open_tinyApp(idFn, path)
                    window.buzhi && window.buzhi.open_tinyApp(idFn, path)
                },
                // 唤醒小程序
                awakenMini(luachUrl) {
                    console.log(luachUrl)
                    try {
                        this.openTinyAppFn(this.encryptionAppId('gh_6a1a609a03d4'), luachUrl)
                    } catch (error) {
                        this.$toast('请在步知公考APP最新版本内打开~')
                    }
                },
                encryptionAppId(appid) {
                    appid = appid.split('')
                    let rules = 0x748596
                    return appid.map(v => String.fromCharCode(v.charCodeAt() ^ rules)).join('')
                },
            }
        })
    </script>
</body>

</html>
